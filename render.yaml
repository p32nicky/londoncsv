services:
  - type: web
    name: londonadventurehub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SITE_TITLE
        value: Explore London Tours
      - key: SITE_URL
        value: https://londonadventurehub-render.onrender.com
