name: Post Substack Notes (3x daily)

# Cloudflare blocks Substack API from GitHub IPs - runs locally via
# Windows scheduled tasks (SubstackNotes-Morning/Midday/Evening) instead.
on:
  workflow_dispatch:

jobs:
  notes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx curl-cffi
      - name: Post notes
        env:
          GROQ_KEY:     ${{ secrets.GROQ_KEY }}
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
          PARIS_SID:    ${{ secrets.PARIS_SID }}
          ROME_SID:     ${{ secrets.ROME_SID }}
        run: python post_notes.py
