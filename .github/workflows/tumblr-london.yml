name: Post London Tours to Tumblr

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install psycopg2-binary requests requests-oauthlib
      - name: Post to Tumblr
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
        run: python sync_tumblr.py
      - name: Commit rate limit log
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .london_last_post || true
          git commit -m "Update London Tumblr rate limit [skip ci]" || true
          git push || true
