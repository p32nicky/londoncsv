name: Substack Sync

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests psycopg2-binary
      - run: python sync_substack.py
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
          SUBSTACK_BATCH: "3"
