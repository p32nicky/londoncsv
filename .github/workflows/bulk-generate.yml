name: Bulk Generate Articles

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx psycopg2-binary
      - run: python bulk_generate.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
