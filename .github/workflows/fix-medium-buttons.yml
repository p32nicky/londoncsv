name: Fix Medium Import Buttons

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx psycopg2-binary
      - run: python fix_medium_buttons.py
        env:
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
