name: Tumblr Sync

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests requests-oauthlib psycopg2-binary
      - run: python sync_tumblr.py
        env:
          TUMBLR_BATCH: "10"
