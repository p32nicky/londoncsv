name: Daily WordPress Sync

on:
  schedule:
    - cron: '0 9 * * *'    # 9am UTC
    - cron: '0 13 * * *'   # 1pm UTC
    - cron: '0 17 * * *'   # 5pm UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx anthropic psycopg2-binary
      - run: python sync_wordpress.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
          BITLY_TOKEN: ${{ secrets.BITLY_TOKEN }}
          SITE_URL: https://londonadventurehub.com
          WP_BATCH: "80"
