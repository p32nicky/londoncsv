name: Tumblr — Churchill War Rooms daily

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests requests_oauthlib
      - name: Post to Tumblr
        env:
          TUMBLR_CONSUMER_KEY:    ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN:           ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET:    ${{ secrets.TUMBLR_TOKEN_SECRET }}
        run: python tumblr_churchill.py
      - name: Persist dedup log
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tumblr_churchill_posted.json 2>/dev/null || true
          git commit -m "Update Churchill Tumblr log [skip ci]" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::failed to persist log" && exit 1
