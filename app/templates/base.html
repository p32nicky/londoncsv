<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="p:domain_verify" content="76b6fd98ba633723db57feeb156dc7ed"/>
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Discover the best London tours, attractions and experiences. Compare prices on walking tours, day trips, theatre tickets and more.{% endblock %}"/>
  {% block canonical %}{% endblock %}
  {% block og %}
  <meta property="og:title" content="{{ site_title }}"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="{{ site_title }}"/>
  {% endblock %}
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3SCC99DFR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z3SCC99DFR');
  </script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2042672987057341"
     crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="/">🇬🇧 {{ site_title }}</a>
      <nav>
        <form class="search-form" action="/" method="get">
          <input type="search" name="q" placeholder="Search tours..." value="{{ query or '' }}"/>
          <button type="submit">Search</button>
        </form>
      </nav>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <p>Tours sourced from <a href="https://www.viator.com" target="_blank" rel="nofollow">Viator</a>. Affiliate links — we may earn a commission.</p>
    <p><a href="/privacy">Privacy Policy</a> · <a href="/terms">Terms of Service</a> · <a href="/affiliate-disclosure">Affiliate Disclosure</a> · <a href="/contact">Contact Us</a></p>
  </footer>
</body>
</html>
