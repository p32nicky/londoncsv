<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>{{ t.title }}</title>
  <meta name="description" content="{{ t.description[:160] if t.description else t.title }}"/>
  <link rel="canonical" href="https://londoncsv.vercel.app/tour/{{ t.slug }}/medium"/>
  <meta property="og:type" content="article"/>
  <meta property="og:title" content="{{ t.title }}"/>
  <meta property="og:description" content="{{ t.description[:160] if t.description else t.title }}"/>
  {% if t.image_url %}<meta property="og:image" content="{{ t.image_url }}"/>{% endif %}
  <meta property="og:url" content="https://londoncsv.vercel.app/tour/{{ t.slug }}/medium"/>
</head>
<body>
<article>
{% if t.image_url %}
<img src="{{ t.image_url }}" alt="{{ t.title }}"/>
{% endif %}
{{ article_html | safe }}
</article>
</body>
</html>
